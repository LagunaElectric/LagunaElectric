<svg width="800" height="200" xmlns="http://www.w3.org/2000/svg">
  <!-- Terminal window background -->
  <rect width="800" height="200" rx="10" ry="10" fill="#0d1117"/>
  <rect width="800" height="35" rx="10" ry="10" fill="#161b22"/>
  <rect x="0" y="25" width="800" height="10" fill="#161b22"/>

  <!-- Window controls -->
  <circle cx="25" cy="17" r="6" fill="#ff5f57"/>
  <circle cx="47" cy="17" r="6" fill="#febc2e"/>
  <circle cx="69" cy="17" r="6" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="400" y="22" font-family="monospace, 'Courier New'" font-size="13" fill="#8b949e" text-anchor="middle">laguna@dev ~ </text>

  <!-- Main name text -->
  <text x="400" y="115" font-family="monospace, 'Courier New'" font-size="72" font-weight="bold" fill="#00ff00" text-anchor="middle">LAGUNA</text>

  <!-- Subtitle -->
  <text x="400" y="155" font-family="monospace, 'Courier New'" font-size="16" fill="#8b949e" text-anchor="middle">~/dev $ echo "building things that build things"</text>

  <!-- Cursor blink -->
  <rect x="660" y="142" width="9" height="16" fill="#00ff00">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Border -->
  <rect width="800" height="200" rx="10" ry="10" fill="none" stroke="#30363d" stroke-width="1"/>
</svg>